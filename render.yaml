services:
  - type: web
    name: apologiasancta-engine
    runtime: node
    plan: free
    branch: main
    autoDeploy: true
    # NODE_ENV=production makes npm omit devDependencies unless they are
    # explicitly included. TypeScript and its type definitions are build-time
    # dependencies, so Render must install them before running `tsc`.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_TOKEN
        sync: false
      - key: PLAYER_JOIN_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://sandybrown-bear-488955.hostingersite.com
      - key: ALLOW_LOCAL_ORIGINS
        value: "false"
      - key: RATE_LIMIT_REGISTER_MAX
        value: "120"
      - key: RATE_LIMIT_REGISTER_WINDOW_MS
        value: "600000"
      - key: DATABASE_URL
        fromDatabase:
          name: apologiasancta-postgres
          property: connectionString
      - key: STATE_PERSISTENCE_DRIVER
        value: postgres
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_VIDEO_ID
        sync: false

databases:
  - name: apologiasancta-postgres
    databaseName: apologiasancta
    user: apologiasancta
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
